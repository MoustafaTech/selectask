name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build and publish
        if: runner.os != 'Windows'
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # electron-builder's own uploader times out reliably on Windows runners,
      # so build without publishing and upload with curl (which can retry).
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --publish never

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          RID=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases" \
            | python3 -c 'import json,sys,os; rs=[r for r in json.load(sys.stdin) if r["tag_name"]==os.environ["TAG"]]; print(rs[0]["id"] if rs else "")')
          if [ -z "$RID" ]; then
            RID=$(curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":true}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          fi
          for f in release/*.exe release/*.exe.blockmap release/latest.yml; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            # replace any half-uploaded asset with the same name
            aid=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/$RID/assets?per_page=100" \
              | python3 -c "import json,sys; a=[x['id'] for x in json.load(sys.stdin) if x['name']=='$name']; print(a[0] if a else '')")
            [ -n "$aid" ] && curl -sf -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/assets/$aid"
            curl -sf --retry 5 --retry-all-errors -X POST \
              -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/octet-stream" \
              --data-binary @"$f" \
              "https://uploads.github.com/repos/$REPO/releases/$RID/assets?name=$name" -o /dev/null
            echo "uploaded $name"
          done
